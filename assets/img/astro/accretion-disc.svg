<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420" role="img" aria-label="Stylised accretion disc around a black hole">
  <defs>
    <radialGradient id="ad-core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000"/><stop offset="62%" stop-color="#05060f"/><stop offset="100%" stop-color="#05060f"/>
    </radialGradient>
    <linearGradient id="ad-disc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4fd2e6"/><stop offset="42%" stop-color="#9b8cff"/>
      <stop offset="70%" stop-color="#ffb347"/><stop offset="100%" stop-color="#ffd66b"/>
    </linearGradient>
    <filter id="ad-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="9" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g transform="translate(300 210)">
    <ellipse rx="250" ry="78" fill="none" stroke="url(#ad-disc)" stroke-width="10" opacity="0.95" filter="url(#ad-glow)"/>
    <ellipse rx="210" ry="64" fill="none" stroke="url(#ad-disc)" stroke-width="5" opacity="0.7"/>
    <ellipse rx="168" ry="50" fill="none" stroke="url(#ad-disc)" stroke-width="3" opacity="0.5"/>
    <!-- relativistic top arc (Doppler-bright) -->
    <path d="M -250 0 A 250 78 0 0 1 250 0" fill="none" stroke="#fff" stroke-width="2" opacity="0.45"/>
    <circle r="58" fill="url(#ad-core)"/>
    <circle r="58" fill="none" stroke="#ffd66b" stroke-width="2" opacity="0.85" filter="url(#ad-glow)"/>
    <circle r="64" fill="none" stroke="#9b8cff" stroke-width="1" opacity="0.5"/>
  </g>
</svg>

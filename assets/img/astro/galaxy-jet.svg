<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" role="img" aria-label="Stylised active galactic nucleus emitting bipolar jets">
  <defs>
    <radialGradient id="gj-core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff"/><stop offset="30%" stop-color="#ffd66b"/>
      <stop offset="70%" stop-color="#9b8cff"/><stop offset="100%" stop-color="#05060f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gj-jet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4fd2e6"/><stop offset="100%" stop-color="#4fd2e6" stop-opacity="0"/>
    </linearGradient>
    <filter id="gj-glow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="6"/></filter>
  </defs>
  <g transform="translate(300 200)">
    <ellipse rx="200" ry="46" fill="url(#gj-core)" opacity="0.55" transform="rotate(-18)"/>
    <path d="M 0 0 L -22 -190 L 22 -190 Z" fill="url(#gj-jet)" opacity="0.8" filter="url(#gj-glow)"/>
    <path d="M 0 0 L -22 190 L 22 190 Z" fill="url(#gj-jet)" opacity="0.8" filter="url(#gj-glow)" transform="scale(1,-1)" style="transform:scale(1,-1)"/>
    <g transform="scale(1,-1)"><path d="M 0 0 L -22 -190 L 22 -190 Z" fill="url(#gj-jet)" opacity="0.8" filter="url(#gj-glow)"/></g>
    <circle r="30" fill="url(#gj-core)"/>
    <circle r="12" fill="#fff"/>
  </g>
</svg>
